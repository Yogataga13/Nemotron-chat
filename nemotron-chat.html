<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nemotron 550B — Code Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --thinking: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --user-bubble: #1e1e2e;
    --ai-bubble: #111118;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .model-badge {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* API KEY BAR */
  #api-bar {
    padding: 10px 24px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  #api-bar label {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #api-key-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  #api-key-input:focus { border-color: var(--accent); }
  #api-key-input::placeholder { color: var(--muted); }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.ok { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
  .status-dot.error { background: #ef4444; }
  .status-dot.loading { background: var(--thinking); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.3 } }

  /* MESSAGES */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-role {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    padding-left: 4px;
  }

  .msg.user .msg-role { color: var(--accent); }
  .msg.assistant .msg-role { color: var(--accent2); }

  .msg-bubble {
    padding: 14px 18px;
    border-radius: var(--radius);
    line-height: 1.7;
    border: 1px solid var(--border);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user .msg-bubble {
    background: var(--user-bubble);
    border-color: #2a2a4a;
  }

  .msg.assistant .msg-bubble {
    background: var(--ai-bubble);
  }

  /* THINKING BLOCK */
  .thinking-block {
    border: 1px solid #f59e0b33;
    border-radius: var(--radius);
    overflow: hidden;
  }

  .thinking-header {
    background: #f59e0b11;
    padding: 8px 14px;
    font-size: 11px;
    color: var(--thinking);
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }

  .thinking-header:hover { background: #f59e0b1a; }

  .thinking-chevron {
    margin-left: auto;
    transition: transform 0.2s;
    font-size: 10px;
  }

  .thinking-header.collapsed .thinking-chevron { transform: rotate(-90deg); }

  .thinking-content {
    padding: 12px 14px;
    font-size: 12px;
    color: #a78236;
    line-height: 1.6;
    border-top: 1px solid #f59e0b22;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 300px;
    overflow-y: auto;
  }

  .thinking-content.hidden { display: none; }

  /* CODE BLOCKS */
  .msg-bubble pre {
    background: #0d0d16 !important;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0;
    margin: 10px 0;
    overflow: hidden;
  }

  .code-header {
    background: #1a1a28;
    padding: 6px 14px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .copy-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
  }

  .copy-btn:hover { color: var(--accent); background: #00e5ff11; }

  .msg-bubble pre code {
    padding: 14px !important;
    display: block;
    font-size: 13px !important;
    line-height: 1.6 !important;
  }

  .msg-bubble p { margin-bottom: 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }

  /* STREAMING CURSOR */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 1s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* INPUT AREA */
  #input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-wrapper {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within { border-color: var(--accent); }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    resize: none;
    min-height: 24px;
    max-height: 160px;
    line-height: 1.6;
  }

  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    width: 36px;
    height: 36px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.2s;
    font-weight: bold;
  }

  #send-btn:hover { transform: scale(1.08); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .input-hint {
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  /* WELCOME */
  #welcome {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  #welcome h2 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 10px;
  }

  #welcome h2 span { color: var(--accent); }

  #welcome p { font-size: 13px; line-height: 1.8; max-width: 400px; margin: 0 auto; }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 24px;
  }

  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .chip:hover { border-color: var(--accent); color: var(--accent); }

  /* SCROLLBAR for thinking */
  .thinking-content::-webkit-scrollbar { width: 4px; }
  .thinking-content::-webkit-scrollbar-thumb { background: #f59e0b44; border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">NEMO<span>TRON</span></div>
  <div class="model-badge">nvidia/nemotron-3-ultra-550b:free · OpenRouter</div>
</header>

<div id="api-bar">
  <label>API Key</label>
  <input id="api-key-input" type="password" placeholder="sk-or-..." autocomplete="off" />
  <div class="status-dot" id="status-dot" title="Statut"></div>
</div>

<div id="messages">
  <div id="welcome">
    <h2>Code avec <span>Nemotron</span></h2>
    <p>Assistant de coding propulsé par le modèle 550B de NVIDIA avec raisonnement étendu activé.</p>
    <div class="chips">
      <div class="chip" onclick="setPrompt('Explique-moi le fonctionnement des WebSockets en JS')">WebSockets JS</div>
      <div class="chip" onclick="setPrompt('Écris une fonction Python pour parser du JSON avec gestion d\'erreurs')">Parser JSON Python</div>
      <div class="chip" onclick="setPrompt('Comment optimiser les requêtes SQL avec des index ?')">Index SQL</div>
      <div class="chip" onclick="setPrompt('Crée un hook React useDebounce')">React hook</div>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-wrapper">
    <textarea id="user-input" placeholder="Pose ta question de code..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Envoyer">↑</button>
  </div>
  <div class="input-hint">Entrée pour envoyer · Shift+Entrée pour nouvelle ligne</div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const apiKeyEl   = document.getElementById('api-key-input');
  const statusDot  = document.getElementById('status-dot');
  const welcome    = document.getElementById('welcome');

  let history = [];
  let isStreaming = false;

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function setPrompt(text) {
    inputEl.value = text;
    inputEl.focus();
    inputEl.dispatchEvent(new Event('input'));
  }

  function setStatus(state) {
    statusDot.className = 'status-dot' + (state ? ' ' + state : '');
  }

  function getApiKey() {
    return apiKeyEl.value.trim();
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderMarkdown(text) {
    // Code blocks
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      const langLabel = lang || 'code';
      const highlighted = lang && hljs.getLanguage(lang)
        ? hljs.highlight(code.trim(), { language: lang }).value
        : escapeHtml(code.trim());
      return `<pre><div class="code-header"><span>${langLabel}</span><button class="copy-btn" onclick="copyCode(this)">copier</button></div><code class="hljs">${highlighted}</code></pre>`;
    });

    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code style="background:#1a1a28;padding:2px 6px;border-radius:4px;font-size:12px;">$1</code>');

    // Bold
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

    // Italic
    text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');

    // Paragraphs
    text = text.split('\n\n').map(p => p.trim() ? `<p>${p.replace(/\n/g, '<br>')}</p>` : '').join('');

    return text;
  }

  function copyCode(btn) {
    const code = btn.closest('pre').querySelector('code').innerText;
    navigator.clipboard.writeText(code).then(() => {
      btn.textContent = '✓ copié';
      setTimeout(() => btn.textContent = 'copier', 2000);
    });
  }

  function appendUserMessage(text) {
    if (welcome) welcome.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `<div class="msg-role">Vous</div><div class="msg-bubble">${escapeHtml(text)}</div>`;
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function createAssistantMessage() {
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.innerHTML = `
      <div class="msg-role">Nemotron 550B</div>
      <div class="thinking-block" id="thinking-block" style="display:none">
        <div class="thinking-header" id="thinking-header" onclick="toggleThinking()">
          <span>⚙ Raisonnement</span>
          <span class="thinking-chevron" id="thinking-chevron">▼</span>
        </div>
        <div class="thinking-content" id="thinking-content"></div>
      </div>
      <div class="msg-bubble" id="response-bubble"><span class="cursor"></span></div>
    `;
    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  function toggleThinking() {
    const content = document.getElementById('thinking-content');
    const header  = document.getElementById('thinking-header');
    content.classList.toggle('hidden');
    header.classList.toggle('collapsed');
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    const apiKey = getApiKey();
    if (!apiKey) {
      apiKeyEl.style.borderColor = '#ef4444';
      apiKeyEl.focus();
      setTimeout(() => apiKeyEl.style.borderColor = '', 1500);
      return;
    }

    isStreaming = true;
    sendBtn.disabled = true;
    setStatus('loading');

    inputEl.value = '';
    inputEl.style.height = 'auto';

    appendUserMessage(text);
    history.push({ role: 'user', content: text });

    const msgDiv = createAssistantMessage();
    const thinkingBlock   = document.getElementById('thinking-block');
    const thinkingContent = document.getElementById('thinking-content');
    const responseBubble  = document.getElementById('response-bubble');

    let thinkingText = '';
    let responseText = '';
    let buffer = '';
    let inThinking = false;

    try {
      const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'nvidia/nemotron-3-ultra-550b-a55b:free',
          messages: [
            {
              role: 'system',
              content: 'Tu es un assistant expert en programmation. Tu réponds en français. Tu fournis du code propre, bien commenté, avec des explications claires. Tu utilises des blocs de code markdown.'
            },
            ...history
          ],
          temperature: 1,
          top_p: 0.95,
          max_tokens: 8192,
          extra_body: {
            chat_template_kwargs: { enable_thinking: true },
            reasoning_budget: 8192
          },
          stream: true
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `HTTP ${res.status}`);
      }

      setStatus('ok');

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;

          let chunk;
          try { chunk = JSON.parse(data); } catch { continue; }

          const delta = chunk.choices?.[0]?.delta;
          if (!delta) continue;

          // Reasoning content
          if (delta.reasoning_content) {
            thinkingText += delta.reasoning_content;
            thinkingBlock.style.display = 'block';
            thinkingContent.textContent = thinkingText;
            scrollToBottom();
          }

          // Response content
          if (delta.content) {
            responseText += delta.content;
            responseBubble.innerHTML = renderMarkdown(responseText) + '<span class="cursor"></span>';
            scrollToBottom();
          }
        }
      }

      // Final render
      responseBubble.innerHTML = renderMarkdown(responseText);
      history.push({ role: 'assistant', content: responseText });

    } catch (err) {
      setStatus('error');
      responseBubble.innerHTML = `<span style="color:#ef4444">⚠ Erreur : ${escapeHtml(err.message)}</span>`;
      history.pop(); // remove failed user message from history
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
    }
  }
</script>
</body>
</html>
